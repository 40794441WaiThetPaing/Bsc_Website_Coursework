<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="setting.js" defer></script>
    <script src="theme.js" defer></script>
</head>

<body>

<!-- Background -->
<video autoplay muted loop id="bgVideo">
    <source src="videos/background4.mp4" type="video/mp4">
</video>
<div id="videoOverlay"></div>

<!-- Header -->
<div id="game-title">Sliding Puzzle Settings</div>
<button id="backBtn" onclick="window.location='main_menu.html'">←</button>

<!-- Settings container -->
<div class="page-container">

    <div class="card settings-card">

        <h2>Settings</h2>

        <!-- Theme -->
        <div class="setting-item">
            <span>Theme</span>
            <select id="themeSelect" onchange="setTheme(this.value)">
                <option value="shinchan">Shinchan</option>
                <option value="spongebob">SpongeBob</option>
                <option value="familyguy">Family Guy</option>
                <option value="tomjerry">Tom & Jerry</option>
                <option value="scoobydoo">Scooby-Doo</option>
                <option value="oggy">Oggy</option>
            </select>
        </div>

        <!-- Actions -->
        <div class="setting-item">
            <span>Clear Theme Progress</span>
            <button class="btn danger" onclick="clearProgressHistory()">Clear</button>
        </div>
        <div class="setting-item">
    <span>Appearance</span>
    <select id="modeSelect" onchange="setMode(this.value)">
        <option value="dark">Dark Mode</option>
        <option value="light">Light Mode</option>
    </select>
</div>
    </div>

</div>

<!-- Toast -->
<div id="toast"></div>

</body>
</html>
