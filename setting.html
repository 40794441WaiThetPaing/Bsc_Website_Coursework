<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- JS -->
    <script src="setting.js" defer></script>
    <script src="theme.js" defer></script>
</head>

<body>

<!-- Background -->
<video autoplay muted loop id="bgVideo">
    <source src="videos/background4.mp4" type="video/mp4">
</video>
<div id="videoOverlay"></div>

<!-- Audio -->
<audio id="bgMusic" loop>
    <source src="videos/bg-music.mp3" type="audio/mpeg">
</audio>

<!-- Header -->
<div id="game-title">⚙️ Sliding Puzzle Settings</div>

<button id="backBtn" onclick="window.location='index.html'">
    <i class="fa-solid fa-arrow-left"></i>
</button>

<!-- Settings -->
<div class="page-container">
    <div class="card settings-card">

        <h2><i class="fa-solid fa-gear"></i> Settings</h2>

        <!-- Theme -->
        <div class="setting-item">
            <span><i class="fa-solid fa-palette"></i> Theme</span>
            <select id="themeSelect" onchange="setTheme(this.value)">
                <option value="shinchan">Shinchan</option>
                <option value="spongebob">SpongeBob</option>
                <option value="familyguy">Family Guy</option>
                <option value="tomjerry">Tom & Jerry</option>
                <option value="scoobydoo">Scooby-Doo</option>
                <option value="oggy">Oggy</option>
            </select>
        </div>

        <!-- Clear Progress -->
        <div class="setting-item">
            <span><i class="fa-solid fa-trash"></i> Clear Theme Progress</span>
            <button class="btn danger" onclick="clearProgressHistory()">
                <i class="fa-solid fa-trash"></i> Clear
            </button>
        </div>

        <!-- Mode -->
        <div class="setting-item">
            <span><i class="fa-solid fa-moon"></i> Appearance</span>
            <select id="modeSelect" onchange="setMode(this.value)">
                <option value="dark">🌙 Dark Mode</option>
                <option value="light">☀️ Light Mode</option>
            </select>
        </div>

        <!-- Music -->
        <div class="setting-item">
            <span><i class="fa-solid fa-music"></i> Background Music</span>
            <button id="musicToggle">🎵 ON</button>
        </div>

    </div>
</div>

<!-- Toast -->
<div id="toast"></div>

</body>
</html>
