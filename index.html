<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Slide Puzzle - Themes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
     <button id="backBtn" onclick="window.location='main_menu.html'">⬅</button>
    <div id="game-title"> 🧩 Sliding Puzzle Game</div>
    <video autoplay muted loop id="bgVideo">
        <source src="videos/background4.mp4" type="video/mp4">
    </video>
    <div id="videoOverlay"></div>

    <div id="theme-selection" class="card">
        <h1> Choose a Theme</h1>
        <div class="theme-grid">
            <a href="level.html?theme=shinchan" class="theme-card">
                <img src="images/previews/shinchan.jpg"><span>Shinchan</span>
            </a>
            <a href="level.html?theme=spongebob" class="theme-card">
                <img src="images/previews/spongebob.jpg"><span>SpongeBob</span>
            </a>
            <a href="level.html?theme=familyguy" class="theme-card">
                <img src="images/previews/familyguy.jpg"><span>Family Guy</span>
            </a>
            <a href="level.html?theme=tomjerry" class="theme-card">
                <img src="images/previews/tomjerry.jpg"><span>Tom & Jerry</span>
            </a>
            <a href="level.html?theme=scoobydoo" class="theme-card">
                <img src="images/previews/scoobydoo.jpg"><span>Scooby-Doo</span>
            </a>
            <a href="level.html?theme=oggy" class="theme-card">
                <img src="images/previews/oggy.jpg"><span>Oggy</span>
            </a>
        </div>
    </div>
</body>
</html>
